site_name: TWMLE
site_url: https://hikarimusic.github.io/TWMLE/

nav:
  - 二階國考:
    - 外科概論: 二階國考/外科概論.md
    - 神經外科: 二階國考/神經外科.md

theme:
  name: material
  palette:
    # Light mode (white theme)
    scheme: default
    primary: white
    accent: blue
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  # Table of contents
  - toc:
      toc_depth: 3
  # Math support
  - pymdownx.arithmatex:
      generic: true
  # Code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  # Better lists
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  # Admonitions (callout boxes)
  - admonition
  - pymdownx.details
  # Other useful extensions
  - attr_list
  - md_in_html
  - footnotes
  - tables

extra_javascript:
  # MathJax for rendering equations
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

copyright: Copyright @ 2026 HikariMusic
