    - 胸腔外科: 醫學五/胸腔外科.md
    - 胃小腸外科: 醫學五/胃小腸外科.md
    - 肝膽胰外科: 醫學五/肝膽胰外科.md
    - 內分泌外科: 醫學五/內分泌外科.md
    - 乳房外科: 醫學五/乳房外科.md
    - 小兒外科: 醫學五/小兒外科.md
